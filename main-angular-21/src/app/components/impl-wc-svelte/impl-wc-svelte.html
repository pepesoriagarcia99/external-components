<div>
  <select (change)="loadWebComponent($event)">
    @for (wc of webComponents; track wc.label) {
    <option [value]="wc.label">{{ wc.label }}</option>
    }
  </select>

  <!-- <button (click)="loadWebComponent()">Iniciar</button> -->

  @if (currentComponent?.label && currentComponent?.src) { @if (!loading) {
  <div>
    <div #wc_container></div>
    <button (click)="setData()">Agregar dato</button>
  </div>
  } @else {
  <p>Cargando...</p>
  } }
</div>
